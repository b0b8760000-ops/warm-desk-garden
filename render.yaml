services:
  - type: web
    name: warm-desk-garden
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build && npm run server:build
    startCommand: npm run server:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_APPWRITE_ENDPOINT
        value: https://sgp.cloud.appwrite.io/v1
      - key: VITE_APPWRITE_PROJECT_ID
        value: 6a39ed84003504b380f9
      - key: APPWRITE_ENDPOINT
        value: https://sgp.cloud.appwrite.io/v1
      - key: APPWRITE_PROJECT_ID
        value: 6a39ed84003504b380f9
      - key: APPWRITE_API_KEY
        sync: false
      - key: APPWRITE_BUCKET_ID
        value: warm-desk-garden-files
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: warm_desk_garden
