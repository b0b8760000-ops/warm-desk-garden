name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --run

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_APPWRITE_ENDPOINT: https://sgp.cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: 6a39ed84003504b380f9

      - name: Build server
        run: npm run server:build
